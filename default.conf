server {
    listen 80;
    listen [::]:80;
    server_name e-smail.ru www.e-smail.ru;
    return 301 https://$host$request_uri;
}

server {
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    server_name e-smail.ru www.e-smail.ru;

    listen 443 ssl;
    listen [::]:443 ssl;

    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_certificate /etc/nginx/ssl/e-smail.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/e-smail.ru/privkey.pem;

    root /build;
    index index.html;

    location /api/ {
        proxy_pass http://backend-app-1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /avatars/ {
        proxy_pass http://backend-minio-1:9000/avatars/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}