name: linter
on:
    pull_request:
        branches: [dev]
jobs:
    name: lint
    runs-on: ubuntu-latest
    steps:
    - name: checkout
        uses: actions/checkout@v4
    - name: Используем Node.js 22
        with:
          node-version: 22.x
    - name: install ci
        run: npm ci
    - name: run-lint
        run: npm run lint
